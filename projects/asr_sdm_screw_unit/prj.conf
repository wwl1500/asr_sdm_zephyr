# Main must not outrank the USB device stack: blocking console TX on CDC ACM
# waits for USB to run; default prio 0 can deadlock poll_out vs. USB worker.
CONFIG_MAIN_THREAD_PRIORITY=0

CONFIG_GPIO=y

# Common shared types and utilities
CONFIG_ASR_COMMON=y

# User LED (PWM brightness on pwm_led0 / GP25)
CONFIG_LED=y
CONFIG_PWM=y
CONFIG_LED_PWM=y
CONFIG_ASR_USR_LED=y

# WS2812 RGB NeoPixel LED (GP22, PIO0)
CONFIG_LED_STRIP=y
CONFIG_ASR_RGB_LED=y

# LED background thread (usr_led steady on, rgb_led blinks blue)
CONFIG_ASR_LED_THREAD=y

# Enable SPI bus
CONFIG_SPI=y

# Enable sensor subsystem
CONFIG_SENSOR=y
CONFIG_ASR_IMU=y
CONFIG_ASR_IMU_THREAD=y
CONFIG_ASR_IMU_STARTUP_DELAY_MS=500
CONFIG_ASR_IMU_PERIOD_MS=1000

# Enable floating-point printf support
CONFIG_CBPRINTF_FP_SUPPORT=y

# Logging configuration
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y

# USB CDC ACM (serial over USB) — new device stack
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USBD_LOG_LEVEL_ERR=y
CONFIG_UDC_DRIVER_LOG_LEVEL_ERR=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y

# USB interface module (raw CDC ACM data pipe)
CONFIG_ASR_USB_INTERFACE=y

# UART0 communication module (D6=TX/GP0, D7=RX/GP1)
# Temporarily disabled so Dynamixel bring-up can own UART0 exclusively.
CONFIG_ASR_COMM=n
CONFIG_UART_INTERRUPT_DRIVEN=y

# Single-servo Dynamixel RS-485 driver on UART0 with manual DE/RE control
# on D2/GP28. Keep comm disabled so the servo bus owns UART0 exclusively.
CONFIG_ASR_DYNAMIXEL=y

# CPU monitor (per-thread usage logging)
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_THREAD_NAME=y
CONFIG_ASR_CPU_MONITOR=y

# Wait for USB connection before startup (optional to avoid missing boot logs)
CONFIG_BOOT_DELAY=1000
